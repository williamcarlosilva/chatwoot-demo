<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1, viewport-fit=cover" />
  <title>Demo Chat – Chatwoot + IA</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
    }

    html, body {
      height: 100%;
      overflow-x: hidden;
    }

    body {
      min-height: var(--vvh, 100vh);
    }

    #chatwoot-widget-container {
      bottom: env(safe-area-inset-bottom, 0px) !important;
    }

    /* Esconde o botão padrão do Chatwoot */
    .woot-widget-bubble {
      display: none !important;
    }

    /* Botão personalizado */
    #custom-chat-button {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 999999;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #589670;
      color: white;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    #custom-chat-button:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>
  <h1>Demo de Chat com IA</h1>
  <p>
    Este é um ambiente de teste do chat integrado com IA.
    Clique no ícone no canto inferior direito para conversar.
  </p>

  <!-- Botão personalizado -->
  <button id="custom-chat-button" aria-label="Abrir chat">
    🌿
  </button>

  <script>
    window.chatwootSettings = {
      position: "right",
      type: "expanded_bubble",
      launcherTitle: "Fale conosco!"
    };

    (function(d,t) {
      var BASE_URL = "https://app.chatwoot.com";
      var g = d.createElement(t), s = d.getElementsByTagName(t)[0];

      g.src = BASE_URL + "/packs/js/sdk.js";
      g.async = true;
      s.parentNode.insertBefore(g,s);

      g.onload = function() {
        window.chatwootSDK.run({
          websiteToken: "5vzRovqwJhvzwCYT7gHHX4Fs",
          baseUrl: BASE_URL
        });
      };
    })(document,"script");

    window.addEventListener("chatwoot:ready", function () {
      var magentoCustomerId = window.MAGENTO_CUSTOMER_ID || "";

      if (magentoCustomerId) {
        window.$chatwoot.setCustomAttributes({
          magento_customer_id: magentoCustomerId
        });
      }

      var customButton = document.getElementById("custom-chat-button");

      customButton.addEventListener("click", function () {
        window.$chatwoot.toggle();
      });
    });
  </script>

  <script>
    (function () {
      function setVh() {
        var vv = window.visualViewport;
        var h = (vv && vv.height) ? vv.height : window.innerHeight;
        document.documentElement.style.setProperty("--vvh", h + "px");
      }

      setVh();
      window.addEventListener("resize", setVh);

      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", setVh);
        window.visualViewport.addEventListener("scroll", setVh);
      }
    })();
  </script>
</body>
</html>
